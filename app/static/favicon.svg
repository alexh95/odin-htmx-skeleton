<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="odin-htmx">
  <title>odin · htmx</title>
  <!-- A fusion mark: htmx's </> angle brackets, the project's violet→cyan
       gradient tile (its Odin-flavoured brand), and the app's bolt accent
       standing in for the centre slash. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#g)"/>
  <g fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="10.5,9.5 5.5,16 10.5,22.5"/>
    <polyline points="21.5,9.5 26.5,16 21.5,22.5"/>
  </g>
  <path d="M17.6 7.5 L12.8 17 L15.8 17 L14.4 24.5 L19.6 15 L16.6 15 Z" fill="#fbbf24"/>
</svg>
