name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Same Odin release the Dockerfile pins, so CI builds what production builds.
env:
  ODIN_VERSION: dev-2026-06

jobs:
  build:
    name: Build + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # WSL/Docker only cover Linux. This matrix also guards Windows (our primary
    # dev platform) and macOS (Apple Silicon = arm64-darwin — the one target we
    # can't test locally, and it exercises odin-http's kqueue path under
    # core:nbio). Odin's release asset names are irregular across platforms, so
    # each leg downloads its own verified asset rather than a templated name.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            odin_asset: odin-linux-amd64-dev-2026-06.tar.gz
            odin_dir: /opt/odin
            exe: ''
          - os: macos-latest
            # arm64 build. This release tagged the macOS-arm64 asset as
            # `...-dev-06` (truncated), unlike the linux `...-dev-2026-06`.
            odin_asset: odin-macos-arm64-dev-06.tar.gz
            odin_dir: /opt/odin
            exe: ''
          - os: windows-latest
            # The Windows asset carries no arch in its name and unpacks to a
            # top-level dist/ (odin.exe + LLVM-C.dll live there together).
            odin_asset: odin-windows-dev-2026-06.zip
            odin_dir: C:\odin
            # Odin won't infer the extension on Windows; -out: needs it spelled out.
            exe: '.exe'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # odin-http is a pinned submodule

      - name: Cache Odin toolchain
        id: cache-odin
        uses: actions/cache@v4
        with:
          path: ${{ matrix.odin_dir }}
          # runner.os in the key so the three OSes don't share one cache entry.
          key: odin-${{ env.ODIN_VERSION }}-${{ runner.os }}

      # Linux + macOS share the tar.gz path; only the asset name differs (matrix).
      # The ubuntu leg is unchanged from before (same URL shape, same install).
      - name: Install Odin (Linux/macOS)
        if: runner.os != 'Windows' && steps.cache-odin.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/odin-lang/Odin/releases/download/${ODIN_VERSION}/${{ matrix.odin_asset }}" -o /tmp/odin.tar.gz
          sudo mkdir -p /opt/odin
          sudo tar -xzf /tmp/odin.tar.gz -C /opt/odin --strip-components=1

      - name: Install Odin (Windows)
        if: runner.os == 'Windows' && steps.cache-odin.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/odin-lang/Odin/releases/download/$env:ODIN_VERSION/${{ matrix.odin_asset }}"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\odin.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\odin.zip" -DestinationPath C:\odin -Force

      # Odin links the final binary through the platform C toolchain (clang/ld on
      # unix, MSVC link.exe on Windows), so each leg makes one available + puts
      # odin on PATH.
      - name: Odin on PATH + clang (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "/opt/odin" >> "$GITHUB_PATH"
          sudo apt-get update && sudo apt-get install -y --no-install-recommends clang

      - name: Odin on PATH + verify clang (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "/opt/odin" >> "$GITHUB_PATH"
          xcode-select -p        # Command Line Tools ship clang/ar — confirm present
          clang --version

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Odin on PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo 'C:\odin\dist' >> "$GITHUB_PATH"   # odin.exe + LLVM-C.dll live in dist/

      - name: Prepare deps (htmx, bin/) — Unix
        if: runner.os != 'Windows'
        run: cd app && sh prepare.sh

      - name: Prepare deps (htmx, bin/) — Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: cd app && prepare.bat

      - name: Build (warnings are errors)
        shell: bash
        run: cd app && odin build src -out:bin/demo${{ matrix.exe }} -warnings-as-errors

      # One smoke script for all three: shell bash everywhere (git-bash is on the
      # Windows runner, and MSYS resolves ./bin/demo to demo.exe). DB_PATH=:memory:
      # keeps it forward-compatible with the planned SQLite layer (no CI volume);
      # it's a harmless no-op against the current in-memory store.
      - name: Smoke test the binary
        shell: bash
        env:
          DB_PATH: ':memory:'
        run: |
          cd app
          BIND_ALL=1 PORT=8099 ./bin/demo${{ matrix.exe }} &
          pid=$!
          for i in $(seq 1 20); do
            curl -fsS "http://127.0.0.1:8099/" -o /dev/null && break
            sleep 0.25
          done
          set -e
          test "$(curl -fsS http://127.0.0.1:8099/healthz)" = "ok"
          curl -fsS "http://127.0.0.1:8099/"                          -o /dev/null
          curl -fsS "http://127.0.0.1:8099/static/app.css"            -o /dev/null
          curl -fsS "http://127.0.0.1:8099/static/htmx.min.js"        -o /dev/null
          code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8099/api/search?q=a")
          test "$code" = "200" || { echo "api/search returned $code"; exit 1; }
          curl -fsS -X POST "http://127.0.0.1:8099/contacts" \
            --data 'name=CI Smoke&email=ci@example.com&role=0&status=1' -o /dev/null
          kill "$pid"

  # Browser tests (Playwright), sharded one engine per runner so the three run
  # concurrently. Runs in Playwright's official image, which bakes in the three
  # browsers + their OS deps + node/npm — so there's no per-run browser install
  # (the biggest, most variable cost, ~30-60s for webkit). global-setup still
  # builds the app, so each shard adds odin + clang. Keep the image tag in step
  # with @playwright/test in e2e/package-lock.json.
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      # The server uses io_uring (core:nbio); Docker's default seccomp profile
      # blocks io_uring syscalls, so the server can't start in the container.
      options: --security-opt seccomp=unconfined
    # GitHub mounts HOME=/github/home for container jobs, which Firefox refuses to
    # launch under (it requires HOME to be owned by the current user). /root is.
    env:
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Odin toolchain
        id: cache-odin
        uses: actions/cache@v4
        with:
          path: /opt/odin
          key: odin-${{ env.ODIN_VERSION }}

      - name: Install Odin
        if: steps.cache-odin.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/odin-lang/Odin/releases/download/${ODIN_VERSION}/odin-linux-amd64-${ODIN_VERSION}.tar.gz" -o /tmp/odin.tar.gz
          mkdir -p /opt/odin
          tar -xzf /tmp/odin.tar.gz -C /opt/odin --strip-components=1

      - name: Put Odin and clang on PATH
        run: |
          echo "/opt/odin" >> "$GITHUB_PATH"
          # clang links Odin and compiles the SQLite amalgamation (prepare.sh);
          # unzip + binutils(ar) extract and archive it. global-setup runs prepare.
          apt-get update && apt-get install -y --no-install-recommends clang binutils unzip

      - name: Install e2e deps
        run: cd e2e && npm ci

      - name: Run e2e
        run: cd e2e && npx playwright test --project=${{ matrix.browser }}
        env:
          CI: 'true'

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.browser }}
          path: e2e/playwright-report/
          retention-days: 7

  # Guards the `init --minimal` starter from rotting. The tools/init/minimal/
  # templates aren't part of the app build (only app/src is), so a change to the
  # skeleton's conventions could silently break them. Strip a fresh checkout to the
  # minimal Notes starter, then run its e2e — global-setup builds it with
  # -warnings-as-errors, so this one job catches both compile- and runtime-rot (and
  # exercises the rename path too, since --minimal renames first). Chromium only:
  # the app is engine-agnostic; cross-browser is the demo's E2E job above.
  minimal:
    name: init --minimal builds + tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --security-opt seccomp=unconfined
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Odin toolchain
        id: cache-odin
        uses: actions/cache@v4
        with:
          path: /opt/odin
          key: odin-${{ env.ODIN_VERSION }}

      - name: Install Odin
        if: steps.cache-odin.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/odin-lang/Odin/releases/download/${ODIN_VERSION}/odin-linux-amd64-${ODIN_VERSION}.tar.gz" -o /tmp/odin.tar.gz
          mkdir -p /opt/odin
          tar -xzf /tmp/odin.tar.gz -C /opt/odin --strip-components=1

      - name: Put Odin and clang on PATH
        run: |
          echo "/opt/odin" >> "$GITHUB_PATH"
          # clang links the init tool + the app, and compiles the SQLite
          # amalgamation (prepare, run by global-setup); unzip + binutils(ar) too.
          apt-get update && apt-get install -y --no-install-recommends clang binutils unzip

      - name: Strip to the minimal starter (renames + strips in place)
        run: odin run tools/init -- minimal-ci --minimal --yes

      - name: Install e2e deps
        run: cd e2e && npm ci

      - name: Build (-warnings-as-errors, via global-setup) + run the minimal e2e
        run: cd e2e && npx playwright test --project=chromium
        env:
          CI: 'true'

  # Deploys the live instance after a green build + e2e on master. Dormant until
  # you opt in: set the FLY_API_TOKEN secret (`fly tokens create deploy`) and the
  # repo variable FLY_DEPLOY=true (see infra/PLAN.md → Operator steps). Until
  # then it's skipped, so CI stays green. If you instead let Fly's GitHub
  # integration auto-deploy, leave FLY_DEPLOY unset and ignore this job.
  deploy:
    name: Deploy (Fly.io)
    needs: [build, e2e, minimal]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.FLY_DEPLOY == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-master
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
