name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Same Odin release the Dockerfile pins, so CI builds what production builds.
env:
  ODIN_VERSION: dev-2026-06

jobs:
  build:
    name: Build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # odin-http is a pinned submodule

      - name: Cache Odin toolchain
        id: cache-odin
        uses: actions/cache@v4
        with:
          path: /opt/odin
          key: odin-${{ env.ODIN_VERSION }}

      - name: Install Odin
        if: steps.cache-odin.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/odin-lang/Odin/releases/download/${ODIN_VERSION}/odin-linux-amd64-${ODIN_VERSION}.tar.gz" -o /tmp/odin.tar.gz
          sudo mkdir -p /opt/odin
          sudo tar -xzf /tmp/odin.tar.gz -C /opt/odin --strip-components=1

      - name: Put Odin and clang on PATH
        run: |
          echo "/opt/odin" >> "$GITHUB_PATH"
          sudo apt-get update && sudo apt-get install -y --no-install-recommends clang

      - name: Prepare deps (htmx, bin/)
        run: cd app && sh prepare.sh

      - name: Build (warnings are errors)
        run: cd app && odin build . -out:bin/demo -warnings-as-errors

      - name: Smoke test the binary
        run: |
          cd app
          BIND_ALL=1 PORT=8099 ./bin/demo &
          pid=$!
          for i in $(seq 1 20); do
            curl -fsS "http://127.0.0.1:8099/" -o /dev/null && break
            sleep 0.25
          done
          set -e
          test "$(curl -fsS http://127.0.0.1:8099/healthz)" = "ok"
          curl -fsS "http://127.0.0.1:8099/"                          -o /dev/null
          curl -fsS "http://127.0.0.1:8099/static/app.css"            -o /dev/null
          curl -fsS "http://127.0.0.1:8099/static/htmx.min.js"        -o /dev/null
          code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8099/api/search?q=a")
          test "$code" = "200" || { echo "api/search returned $code"; exit 1; }
          curl -fsS -X POST "http://127.0.0.1:8099/contacts" \
            --data 'name=CI Smoke&email=ci@example.com&role=0&status=1' -o /dev/null
          kill "$pid"

  # Browser tests (Playwright), sharded one engine per runner so the three run
  # concurrently. Runs in Playwright's official image, which bakes in the three
  # browsers + their OS deps + node/npm — so there's no per-run browser install
  # (the biggest, most variable cost, ~30-60s for webkit). global-setup still
  # builds the app, so each shard adds odin + clang. Keep the image tag in step
  # with @playwright/test in e2e/package-lock.json.
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Odin toolchain
        id: cache-odin
        uses: actions/cache@v4
        with:
          path: /opt/odin
          key: odin-${{ env.ODIN_VERSION }}

      - name: Install Odin
        if: steps.cache-odin.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/odin-lang/Odin/releases/download/${ODIN_VERSION}/odin-linux-amd64-${ODIN_VERSION}.tar.gz" -o /tmp/odin.tar.gz
          mkdir -p /opt/odin
          tar -xzf /tmp/odin.tar.gz -C /opt/odin --strip-components=1

      - name: Put Odin and clang on PATH
        run: |
          echo "/opt/odin" >> "$GITHUB_PATH"
          apt-get update && apt-get install -y --no-install-recommends clang

      - name: Install e2e deps
        run: cd e2e && npm ci

      - name: Run e2e
        run: cd e2e && npx playwright test --project=${{ matrix.browser }}
        env:
          CI: 'true'

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.browser }}
          path: e2e/playwright-report/
          retention-days: 7

  # Deploys the live instance after a green build + e2e on master. Dormant until
  # you opt in: set the FLY_API_TOKEN secret (`fly tokens create deploy`) and the
  # repo variable FLY_DEPLOY=true (see infra/PLAN.md → Operator steps). Until
  # then it's skipped, so CI stays green. If you instead let Fly's GitHub
  # integration auto-deploy, leave FLY_DEPLOY unset and ignore this job.
  deploy:
    name: Deploy (Fly.io)
    needs: [build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.FLY_DEPLOY == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-master
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
