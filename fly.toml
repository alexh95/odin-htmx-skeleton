# Fly.io app config. Rename `app` if you pick a different name at `fly launch`.
# One small machine handles this comfortably: the server runs one nbio thread per
# core (RW_Mutex-guarded store) and async IO serves many concurrent connections.
# Region is near the primary audience — latency is dominated by RTT, not compute
# (see load-tests/RESULTS.md), so serve from close by.

app            = "odin-htmx-skeleton"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "8080"
  BIND_ALL = "1"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  # Keep one machine always up so the demo is permanently reachable (no cold
  # start). Drop to 0 to scale fully to zero and trade latency for cost.
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "2s"
    grace_period = "5s"
    method       = "GET"
    path         = "/healthz"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
